name: cloudhub-vpn

mgmt:
  network: cloudhub-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  nodes:
    # ============================
    #  HUB — Gateway VPN Central
    # ============================
    hub:
      kind: linux
      image: clab-hub:latest
      mgmt-ipv4: 172.20.20.10
      binds:
        - config/hub_wg0.conf:/etc/wireguard/wg0.conf
      ports:
        - "8080:8080"       # API de estado del Hub
        - "51820:51820/udp" # WireGuard (no necesario en lab, pero útil para debug)
      env:
        NODE_ROLE: hub

    # ============================
    #  SPOKE-01 — Empleado Remoto
    # ============================
    spoke-01:
      kind: linux
      image: clab-spoke:latest
      mgmt-ipv4: 172.20.20.11
      binds:
        - config/spoke01_wg0.conf:/etc/wireguard/wg0.conf
      env:
        NODE_ROLE: spoke
        NODE_NAME: empleado-remoto

    # ============================
    #  SPOKE-02 — PC de Oficina
    # ============================
    spoke-02:
      kind: linux
      image: clab-spoke:latest
      mgmt-ipv4: 172.20.20.12
      binds:
        - config/spoke02_wg0.conf:/etc/wireguard/wg0.conf
      env:
        NODE_ROLE: spoke
        NODE_NAME: pc-oficina

    # ============================
    #  SPOKE-03 — Servidor Interno
    # ============================
    spoke-03:
      kind: linux
      image: clab-spoke:latest
      mgmt-ipv4: 172.20.20.13
      binds:
        - config/spoke03_wg0.conf:/etc/wireguard/wg0.conf
      env:
        NODE_ROLE: servidor
        NODE_NAME: servidor-interno

    # ============================
    #  DASHBOARD — Panel de monitorización
    # ============================
    dashboard:
      kind: linux
      image: clab-dashboard:latest
      mgmt-ipv4: 172.20.20.100
      ports:
        - "3000:3000"       # Dashboard web
      env:
        NODE_ROLE: dashboard
